<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>体力測定ビジュアライザー</title>
  <style>
    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --red: #ef4444;
      --green: #16a34a;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--slate-50);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      color: var(--slate-800);
    }
    button, input, select, textarea {
      font: inherit;
    }
    button {
      cursor: pointer;
      border: 0;
    }
    button:disabled {
      cursor: default;
    }
    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    .header {
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--slate-200);
      padding-bottom: 16px;
      margin-bottom: 28px;
    }
    .logo {
      background: var(--blue);
      color: #fff;
      border-radius: 10px;
      padding: 10px;
      font-size: 22px;
    }
    .title {
      font-size: 26px;
      font-weight: 800;
      margin: 0;
    }
    .subtitle {
      font-size: 13px;
      color: var(--slate-500);
      margin: 2px 0 0;
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      background: #fff;
      color: var(--slate-600);
      border: 1px solid var(--slate-200);
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
    }
    .icon-btn:hover {
      background: var(--slate-100);
    }
    .grid {
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 28px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--slate-200);
      border-radius: 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
      padding: 18px;
    }
    .card h2, .card h3 {
      margin: 0 0 14px;
      font-size: 17px;
      color: var(--slate-700);
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--slate-500);
      font-weight: 700;
      margin: 8px 0 4px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--slate-300);
      border-radius: 9px;
      padding: 9px 10px;
      background: #fff;
      color: var(--slate-900);
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid rgba(37, 99, 235, .25);
      border-color: var(--blue);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .metric-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--slate-100);
      padding-top: 10px;
      margin-top: 10px;
    }
    .metric-row label {
      font-size: 13px;
      margin: 0;
      color: var(--slate-600);
    }
    .metric-row input {
      width: 110px;
      text-align: right;
    }
    .primary {
      width: 100%;
      margin-top: 18px;
      background: var(--blue);
      color: white;
      border-radius: 11px;
      padding: 12px;
      font-weight: 800;
    }
    .primary:hover {
      background: var(--blue-dark);
    }
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 22px;
    }
    .selected-date {
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 12px;
      padding: 14px;
      font-size: 20px;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pill {
      background: #bfdbfe;
      color: #1e40af;
      font-size: 12px;
      border-radius: 999px;
      padding: 4px 8px;
    }
    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .calendar-nav button {
      background: var(--slate-100);
      border-radius: 8px;
      padding: 5px 8px;
    }
    .week, .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      text-align: center;
    }
    .week div {
      font-size: 12px;
      font-weight: 800;
      color: var(--slate-500);
    }
    .day {
      height: 42px;
      border-radius: 10px;
      background: transparent;
      color: var(--slate-300);
      position: relative;
    }
    .day.has {
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 800;
    }
    .day.has:after {
      content: "";
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--blue);
    }
    .day.selected {
      background: var(--blue);
      color: #fff;
    }
    .day.selected:after {
      display: none;
    }
    .chart-card {
      text-align: center;
    }
    .chart-card h3 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .legend {
      display: flex;
      gap: 22px;
      justify-content: center;
      font-size: 13px;
      color: var(--slate-600);
      margin-top: 8px;
    }
    .legend .box {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      vertical-align: -2px;
      margin-right: 5px;
    }
    .note {
      margin: 10px auto 0;
      max-width: 420px;
      background: var(--slate-50);
      border: 1px solid var(--slate-100);
      border-radius: 9px;
      padding: 8px;
      font-size: 11px;
      color: var(--slate-500);
    }
    .compare-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    .small-btn {
      border-radius: 9px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
      background: var(--slate-100);
      color: var(--slate-700);
    }
    .small-btn.dark {
      background: var(--slate-800);
      color: #fff;
    }
    .small-btn.red {
      background: #fee2e2;
      color: #b91c1c;
    }
    .small-btn:hover {
      filter: brightness(.96);
    }
    .comp-item {
      border-bottom: 1px solid var(--slate-100);
      padding: 9px 0;
    }
    .comp-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--slate-500);
      margin-bottom: 4px;
    }
    .comp-value {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }
    .diff {
      font-size: 13px;
      border-radius: 7px;
      background: var(--slate-50);
      padding: 3px 7px;
    }
    .diff.good {
      color: var(--green);
    }
    .diff.bad {
      color: var(--red);
    }
    .diff.neutral {
      color: var(--slate-400);
    }
    .range {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
      background: var(--slate-50);
      border: 1px solid var(--slate-100);
      border-radius: 7px;
      padding: 5px;
      font-size: 10px;
      color: var(--slate-400);
    }
    .empty {
      background: var(--slate-100);
      border: 2px dashed var(--slate-300);
      border-radius: 16px;
      text-align: center;
      color: var(--slate-400);
      padding: 60px 20px;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .52);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .modal-box {
      background: #fff;
      border-radius: 18px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(15, 23, 42, .25);
      overflow: hidden;
    }
    .modal-top {
      background: var(--blue);
      color: #fff;
      text-align: center;
      padding: 28px;
    }
    .modal-body {
      padding: 26px;
    }
    .modal-feature {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
    }
    .modal-feature b {
      display: block;
      font-size: 17px;
      margin-bottom: 4px;
    }
    .modal-feature p {
      margin: 0;
      color: var(--slate-600);
    }
    .modal-icon {
      background: #dbeafe;
      color: var(--blue);
      border-radius: 999px;
      min-width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .confirm-actions {
      display: flex;
      gap: 10px;
    }
    .confirm-actions button {
      flex: 1;
      border-radius: 10px;
      padding: 11px;
      font-weight: 800;
    }
    .cancel {
      background: var(--slate-100);
      color: var(--slate-700);
    }
    .danger {
      background: var(--red);
      color: #fff;
    }
    .preview {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 40;
      overflow: auto;
      padding: 24px;
    }
    .preview-tools {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, .93);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--slate-200);
      padding: 10px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      z-index: 10;
    }
    .report {
      max-width: 210mm;
      margin: 0 auto;
      background: #fff;
      padding: 28px;
    }
    .report-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 4px solid var(--blue);
      padding-bottom: 14px;
      margin-bottom: 24px;
    }
    .report-title {
      font-size: 30px;
      font-weight: 900;
      color: var(--slate-900);
    }
    .report-flex {
      display: grid;
      grid-template-columns: 45% 55%;
      gap: 28px;
    }
    .report-section-title {
      background: var(--blue);
      color: #fff;
      display: inline-block;
      border-radius: 8px 8px 0 0;
      padding: 6px 12px;
      font-weight: 800;
    }
    .report-list {
      border-top: 4px solid var(--blue);
      padding-top: 8px;
    }
    .report-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 1px solid var(--slate-200);
      padding: 6px 0;
    }
    .advice {
      border: 2px solid #bfdbfe;
      background: #eff6ff;
      border-radius: 16px;
      padding: 16px;
      margin-top: 24px;
    }
    .advice textarea {
      min-height: 150px;
      border-color: #bfdbfe;
      line-height: 1.7;
      font-weight: 600;
    }
    .print-advice {
      display: none;
    }
    .hidden {
      display: none !important;
    }
    
    /* アプリ内トースト通知(メッセージボックス)用スタイル */
    .toast-container {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 90%;
      max-width: 450px;
    }
    .toast {
      background: var(--slate-900);
      color: #fff;
      padding: 14px 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.15);
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      animation: toast-fade-in 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .toast.toast-error {
      background: var(--red);
    }
    .toast.toast-success {
      background: var(--green);
    }
    @keyframes toast-fade-in {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* レスポンシブ設計：画面表示時のみに限定化する(印刷時のカラム崩れを完全に防ぐ) */
    @media screen and (max-width: 900px) {
      .grid, .main-grid, .report-flex {
        grid-template-columns: 1fr;
      }
      .container {
        padding: 16px;
      }
      .header {
        align-items: flex-start;
      }
      .header-actions {
        margin-left: 0;
      }
      .title {
        font-size: 22px;
      }
    }

    /* システム印刷メディアクエリ設計 */
    @media print {
      body {
        background: #fff !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .container, .preview-tools, .toast-container {
        display: none !important;
      }
      .preview {
        position: static !important;
        display: block !important;
        padding: 0 !important;
        overflow: visible !important;
        background: #fff !important;
      }
      .report {
        padding: 0 !important;
        max-width: 190mm !important; /* A4実効領域幅へのジャストフィット */
        width: 100% !important;
        box-shadow: none !important;
        overflow: visible !important;
      }
      .report-flex {
        display: grid !important;
        grid-template-columns: 42% 58% !important; /* レーダー幅と比較テーブルの絶妙な比率調整 */
        gap: 20px !important;
        overflow: visible !important;
      }
      .chart-card {
        padding: 0 !important;
        margin: 0 !important;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
      .legend {
        margin-top: 12px !important;
        font-size: 11px !important;
      }
      .no-print {
        display: none !important;
      }
      .advice {
        margin-top: 20px !important;
        border: 1px solid #bfdbfe !important;
        background: #eff6ff !important;
        padding: 12px !important;
        page-break-inside: avoid !important;
      }
      .print-advice {
        display: block !important;
        white-space: pre-wrap !important;
        word-break: break-all !important;
        border: none !important;
        padding: 0 !important;
        background: transparent !important;
        line-height: 1.6 !important;
        font-size: 13px !important;
        font-weight: 600 !important;
        color: var(--slate-800) !important;
        min-height: auto !important;
        overflow: visible !important;
      }
      @page {
        size: A4 portrait;
        margin: 10mm; /* A4標準印刷マージン */
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const STORAGE_KEY = 'fitness_records_v3';
    const METRICS = {
      gripRight: { label: '握力:右(kg)', printLabel: '握力(右)', max: 30, min: 3, inputMax: 100, higherIsBetter: true, rangeLabel: '3 〜 30 kg', directionLabel: '数値が大きいほど高機能' },
      gripLeft: { label: '握力:左(kg)', printLabel: '握力(左)', max: 30, min: 3, inputMax: 100, higherIsBetter: true, rangeLabel: '3 〜 30 kg', directionLabel: '数値が大きいほど高機能' },
      oneLegRight: { label: '片足立ち:右(秒)', printLabel: '片足立ち(右)', max: 30, min: 0, inputMax: 120, higherIsBetter: true, rangeLabel: '0 〜 30 秒', directionLabel: '数値が大きいほど高機能' },
      oneLegLeft: { label: '片足立ち:左(秒)', printLabel: '片足立ち(左)', max: 30, min: 0, inputMax: 120, higherIsBetter: true, rangeLabel: '0 〜 30 秒', directionLabel: '数値が大きいほど高機能' },
      chairStand: { label: '立ち座り(回)', printLabel: '立ち座り', max: 15, min: 5, inputMax: 50, higherIsBetter: true, rangeLabel: '5 〜 15 回', directionLabel: '回数が多いほど高機能 (CS-30基準)' },
      walk5mNormal: { label: '5m歩行(通常)(秒)', printLabel: '5m歩行(通常)', max: 15, min: 5, inputMax: 60, higherIsBetter: false, rangeLabel: '15.0 〜 5.0 秒', directionLabel: '時間が短いほど高機能' },
      walk5mFast: { label: '5m歩行(最大)(秒)', printLabel: '5m歩行(最大)', max: 13.5, min: 3, inputMax: 60, higherIsBetter: false, rangeLabel: '13.5 〜 3.0 秒', directionLabel: '時間が短いほど高機能' },
      tug: { label: 'TUG(秒)', printLabel: 'TUG', max: 30, min: 7, inputMax: 120, higherIsBetter: false, rangeLabel: '30.0 〜 7.0 秒', directionLabel: '時間が短いほど高機能' }
    };
    const keys = Object.keys(METRICS);
    const $ = (id) => document.getElementById(id);
    const fmtDate = (d) => new Date(d + 'T00:00:00').toLocaleDateString('ja-JP');
    const today = () => new Date().toISOString().slice(0, 10);
    const generateId = () => Math.random().toString(36).slice(2, 11);
    
    let state = {
      records: [],
      selectedUser: '',
      currentId: '',
      compareId: '',
      displayDate: new Date(),
      preview: false,
      welcome: false,
      deleteId: null,
      inputDate: today(),
      inputName: '',
      inputs: { gripRight: '', gripLeft: '', oneLegRight: '', oneLegLeft: '', chairStand: '', walk5mNormal: '', walk5mFast: '', tug: '' },
      toast: { message: '', visible: false, type: 'info' }
    };

    let toastTimeout = null;
    function showToast(message, type = 'info') {
      if (toastTimeout) {
        clearTimeout(toastTimeout);
      }
      state.toast = { message, visible: true, type };
      render();
      toastTimeout = setTimeout(() => {
        state.toast.visible = false;
        render();
      }, 4000);
    }

    function sanitize(records) {
      return Array.isArray(records) ? records.map(r => ({
        id: r.id || generateId(),
        date: r.date || today(),
        name: r.name || '名前不明',
        gripRight: +r.gripRight || 0,
        gripLeft: +r.gripLeft || 0,
        oneLegRight: +r.oneLegRight || 0,
        oneLegLeft: +r.oneLegLeft || 0,
        chairStand: +r.chairStand || 0,
        walk5mNormal: +r.walk5mNormal || 0,
        walk5mFast: +r.walk5mFast || 0,
        tug: +r.tug || 0,
        aiComment: r.aiComment
      })) : []
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          state.records = sanitize(JSON.parse(raw));
        } else {
          state.welcome = true;
        }
      } catch (e) {
        showToast('保存データの読み込みに失敗しました。初期状態で起動します。', 'error');
        state.records = [];
        state.welcome = true;
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.records));
    }

    function userRecords() {
      return state.records.filter(r => r.name === state.selectedUser).sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function current() {
      return userRecords().find(r => r.id === state.currentId) || null
    }

    function compare() {
      return userRecords().find(r => r.id === state.compareId) || null
    }

    function users() {
      return [...new Set(state.records.map(r => r.name).filter(Boolean))].sort()
    }

    function normalize(key, value) {
      const v = Number(value);
      if (!value || Number.isNaN(v) || v <= 0) return 20;
      const m = METRICS[key];
      let score = 0;
      if (m.higherIsBetter) {
        score = key === 'chairStand' ? (v <= m.min ? 0 : Math.min(100, ((v - m.min) / (m.max - m.min)) * 100)) : Math.min(100, Math.max(0, (v / m.max) * 100));
      } else {
        score = v >= m.max ? 0 : (v <= m.min ? 100 : ((m.max - v) / (m.max - m.min)) * 100);
      }
      return Math.max(20, score)
    }

    function unit(key) {
      return key.includes('grip') ? 'kg' : (key === 'chairStand' ? '回' : '秒')
    }

    function selectRecord(id) {
      state.currentId = id;
      const urs = userRecords();
      const idx = urs.findIndex(r => r.id === id);
      state.compareId = (idx !== -1 && idx + 1 < urs.length) ? urs[idx + 1].id : '';
      render()
    }

    function ensureCurrent() {
      const urs = userRecords();
      if (urs.length && !urs.some(r => r.id === state.currentId)) selectRecordNoRender(urs[0].id);
      if (!urs.length) {
        state.currentId = '';
        state.compareId = ''
      }
    }

    function selectRecordNoRender(id) {
      state.currentId = id;
      const urs = userRecords();
      const idx = urs.findIndex(r => r.id === id);
      state.compareId = (idx !== -1 && idx + 1 < urs.length) ? urs[idx + 1].id : ''
    }

    function html(s) {
      return String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]))
    }

    function getComment(cur, prev) {
      if (!prev) return `${cur.name}様、本日は体力測定お疲れ様でした。今回の測定値を最初の基準値として登録しました。ご自身の現在の強みと課題を把握し、ここから焦らずマイペースに機能維持・向上へ取り組んでいきましょう。スタッフ一同サポートさせていただきます。`;
      let im = [], mob = [], stable = 0;
      keys.forEach(k => {
        const m = METRICS[k], diff = (cur[k] || 0) - (prev[k] || 0);
        if (m.higherIsBetter) {
          if (diff > 0) im.push(m.printLabel);
          else if (diff === 0) stable++;
        } else {
          if (diff < 0) {
            im.push(m.printLabel);
            if (k.includes('walk') || k === 'tug') mob.push(m.printLabel)
          } else if (diff === 0) stable++;
        }
      });
      let c = `${cur.name}様、本日は体力測定お疲れ様でした。`;
      if (im.length) {
        c += `前回と比較して「${im.slice(0, 3).join('・')}」の測定結果に良好な改善が見られます。これまでの機能維持に向けた取り組みが、数値となってしっかりと成果に現れています。`;
        if (mob.length) c += ' 特に歩行能や移動時の動作が非常に安定してきており、転倒予防の観点からも素晴らしい経過です。';
        c += ' この調子で無理のない範囲で今のトレーニングを継続していきましょう。'
      } else if (stable >= 3) {
        c += '全体的に前回と変わらず、非常に安定した状態を維持できております。日常生活レベルを自立して保つためには、この「現状維持」が何よりも価値ある成果です。引き続きご自身のペースを大切に続けてまいりましょう。';
      } else {
        c += '日々の体調や天候によって測定結果は細かく変動します。一時的な数値の増減に一喜一憂せず、まずはリハビリテーションを楽しく、継続しておこなうことを第一目標にしましょう。いつでもお気軽にご相談くださいね。';
      }
      return c
    }

    function radar(cur, prev, isPrint = false) {
      // 印刷可能領域にジャストフィットさせるため、印刷用チャートは横幅を370pxにダウンサイズし、
      // はみ出しや要素配置のズレを完全に防ぎます。
      const size = isPrint ? 370 : 320, center = size / 2, radius = isPrint ? 100 : 110, step = Math.PI * 2 / keys.length;
      const coord = (val, i) => {
        const a = i * step - Math.PI / 2, r = val / 100 * radius;
        return [center + r * Math.cos(a), center + r * Math.sin(a)]
      };
      const grid = [.2, .4, .6, .8, 1].map((lv, i) => `<polygon points="${keys.map((_, j) => {
        const a = j * step - Math.PI / 2, r = radius * lv;
        return `${center + r * Math.cos(a)},${center + r * Math.sin(a)}`
      }).join(' ')}" fill="${i % 2 === 0 ? '#f8fafc' : 'white'}" stroke="#cbd5e1"/>`).join('');
      const lines = keys.map((_, i) => {
        const [x, y] = coord(100, i);
        return `<line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="#cbd5e1"/>`
      }).join('');
      
      // レーダーチャートラベルテキスト。印刷時にベクター描画の誤差でフォント位置がズレないよう、
      // 印刷用CSSプロパティ(text-rendering: geometricPrecision)を付与したスタイルで安定化させます。
      const labels = keys.map((k, i) => {
        const a = i * step - Math.PI / 2, lr = radius + (isPrint ? 40 : 35);
        return `<text x="${center + lr * Math.cos(a)}" y="${center + lr * Math.sin(a)}" text-anchor="middle" dominant-baseline="central" font-size="${isPrint ? 12 : 10}" font-weight="${isPrint ? '700' : '600'}" fill="${isPrint ? '#000' : '#64748b'}" style="${isPrint ? 'text-rendering: geometricPrecision;' : ''}">${isPrint ? METRICS[k].printLabel : METRICS[k].label}</text>`
      }).join('');
      
      const path = (rec) => rec ? keys.map((k, i) => coord(normalize(k, rec[k]), i).join(',')).join(' ') : '';
      const prevPoly = prev ? `<polygon points="${path(prev)}" fill="rgba(148,163,184,.2)" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 2"/>` : '';
      const curPoly = cur ? `<polygon points="${path(cur)}" fill="rgba(37,99,235,.3)" stroke="#2563eb" stroke-width="${isPrint ? 4 : 2}"/>` : '';
      const dots = isPrint && cur ? keys.map((k, i) => {
        const [x, y] = coord(normalize(k, cur[k]), i);
        return `<circle cx="${x}" cy="${y}" r="5" fill="#2563eb" stroke="white" stroke-width="2"/>`
      }).join('') : '';
      
      return `
        <div class="card chart-card">
          <h3>📈 身体機能バランス</h3>
          <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="max-width:100%;overflow:visible;display:block;margin:0 auto">${grid}${lines}${labels}${prevPoly}${curPoly}${dots}</svg>
          <div class="legend">
            <span><i class="box" style="background:rgba(37,99,235,.3);border:2px solid #2563eb"></i>今回の結果</span>
            ${prev ? `<span><i class="box" style="background:rgba(148,163,184,.2);border:2px dashed #94a3b8"></i>前回(${fmtDate(prev.date)})</span>` : ''}
          </div>
          <div class="note no-print">円の外側に近いほど、体が元気に動かせていることを示します。秒数項目は、時間が短いほど外側に広がります。</div>
        </div>
      `;
    }

    function calendar() {
      const d = state.displayDate, y = d.getFullYear(), m = d.getMonth(), days = new Date(y, m + 1, 0).getDate(), first = new Date(y, m, 1).getDay();
      const map = {};
      userRecords().forEach(r => map[r.date] = r.id);
      let cells = '';
      for (let i = 0; i < first; i++) cells += '<div></div>';
      for (let day = 1; day <= days; day++) {
        const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`, id = map[ds], sel = current() && current().date === ds;
        cells += `<button class="day ${id ? 'has' : ''} ${sel ? 'selected' : ''}" ${id ? `onclick="selectRecord('${id}')"` : 'disabled'}>${day}</button>`
      }
      return `
        <div class="card">
          <div class="calendar-head">
            <h3>📅 測定記録カレンダー</h3>
            <div class="calendar-nav">
              <button onclick="moveMonth(-1)">‹</button>
              <b>${y}年 ${m + 1}月</b>
              <button onclick="moveMonth(1)">›</button>
            </div>
          </div>
          <div class="week">${['日', '月', '火', '水', '木', '金', '土'].map(x => `<div>${x}</div>`).join('')}</div>
          <div class="days">${cells}</div>
        </div>
      `;
    }

    function moveMonth(n) {
      const d = state.displayDate;
      state.displayDate = new Date(d.getFullYear(), d.getMonth() + n, 1);
      render()
    }

    function exportCSV() {
      const headers = ['ID', '日付', '名前', '握力(右)', '握力(左)', '片足立ち(右)', '片足立ち(左)', '立ち座り', '5m歩行(通常)', '5m歩行(最大)', 'TUG', 'スタッフコメント'];
      const rows = state.records.map(r => [r.id, r.date, `"${String(r.name).replace(/"/g, '""')}"`, r.gripRight, r.gripLeft, r.oneLegRight, r.oneLegLeft, r.chairStand, r.walk5mNormal, r.walk5mFast, r.tug, `"${String(r.aiComment || '').replace(/"/g, '""')}"`].join(','));
      const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), [headers.join(','), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `fitness_data_${today()}.csv`;
      a.click();
      URL.revokeObjectURL(url)
    }

    function addRecord(e) {
      e.preventDefault();
      const name = $('inputName').value.trim();
      if (!name) return;
      let vals = {};
      for (const k of keys) {
        const v = Number($('in_' + k).value), max = METRICS[k].inputMax;
        if (Number.isNaN(v) || v < 0 || v > max) {
          showToast(`${METRICS[k].label}は0〜${max}の範囲で入力してください。`, 'error');
          return
        }
        vals[k] = v
      }
      const rec = { id: generateId(), date: $('inputDate').value, name, ...vals, aiComment: undefined };
      state.records.push(rec);
      state.selectedUser = name;
      state.inputDate = $('inputDate').value;
      state.inputName = name;
      state.inputs = { gripRight: '', gripLeft: '', oneLegRight: '', oneLegLeft: '', chairStand: '', walk5mNormal: '', walk5mFast: '', tug: '' };
      save();
      selectRecordNoRender(rec.id);
      showToast(`${name}様の測定データを保存しました。`, 'success');
      render()
    }

    function changeUser(v) {
      state.selectedUser = v;
      state.currentId = '';
      state.compareId = '';
      ensureCurrent();
      render()
    }

    function compareRows(cur, prev) {
      return keys.map(k => {
        const c = Number(cur[k]) || 0, p = prev ? Number(prev[k]) || 0 : 0, m = METRICS[k];
        if (!prev) return `<div class="comp-item"><div class="comp-label">${m.label}</div><div class="comp-value">${c} <small>${unit(k)}</small></div></div>`;
        const diff = c - p, pos = m.higherIsBetter ? diff > 0 : diff < 0, cls = diff === 0 ? 'neutral' : (pos ? 'good' : 'bad');
        return `
          <div class="comp-item">
            <div class="comp-label">${m.label}</div>
            <div class="comp-value">
              <span>${c} <small>${unit(k)}</small></span>
              <span class="diff ${cls}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}${pos ? ' 向上' : ''}</span>
              <small style="margin-left:auto;color:#94a3b8">前: ${p}</small>
            </div>
            <div class="range no-print"><span>マッピング基準: ${m.rangeLabel}</span><span>${m.directionLabel}</span></div>
          </div>
        `;
      }).join('')
    }

    function showPreview() {
      state.preview = true;
      render()
    }
    
    function closePreview() {
      state.preview = false;
      render()
    }

    function doPrint() {
      const cur = current();
      if (!cur) {
        showToast('印刷する記録が選択されていません。対象者と測定日を選択してください。', 'error');
        return;
      }

      if (document.activeElement && typeof document.activeElement.blur === 'function') {
        document.activeElement.blur();
      }

      const wasPreview = state.preview;
      
      state.preview = true;
      render();

      const restoreAfterPrint = () => {
        window.removeEventListener('afterprint', restoreAfterPrint);
        if (!wasPreview) {
          state.preview = false;
          render();
        }
      };
      window.addEventListener('afterprint', restoreAfterPrint);

      // システム印刷ダイアログの起動タイミングを調整。
      // レンダリングエンジンの再計算、およびSVG内のフォントベクター配置確定後に完全に合致させます。
      setTimeout(() => {
        try {
          window.focus();
          window.print();
        } catch (e) {
          showToast('印刷プレビューを開けませんでした。ブラウザの設定か、キーボードショートカット（Ctrl+P / Cmd+P）をお試しください。', 'error');
          restoreAfterPrint();
        }
      }, 300);
    }

    function askDelete(id) {
      state.deleteId = id;
      render()
    }
    
    function cancelDelete() {
      state.deleteId = null;
      render()
    }
    
    function execDelete() {
      state.records = state.records.filter(r => r.id !== state.deleteId);
      state.deleteId = null;
      ensureCurrent();
      save();
      showToast('測定データを削除しました。', 'success');
      render()
    }
    
    function closeWelcome() {
      state.welcome = false;
      render()
    }
    
    function showWelcome() {
      state.welcome = true;
      render()
    }
    
    function updateAdvice(v) {
      const cur = current();
      if (!cur) return;
      cur.aiComment = v;
      save();
      
      const printDiv = document.querySelector('.print-advice');
      if (printDiv) {
        printDiv.textContent = v;
      }
    }

          </div>

                  ${keys.map(k => {
                    const m = METRICS[k], c = cur[k] || 0, p = prev ? prev[k] : null, d = p !== null ? c - p : 0, pos = m.higherIsBetter ? d > 0 : d < 0;
                    return `
                      <div class="report-row">

                            ${d !== 0 ? `<div style="font-size:13px;font-weight:800;color:${pos ? '#2563eb' : '#ef4444'}">${d > 0 ? '+' : ''}${d.toFixed(1)} ${pos ? '(向上)' : ''}</div>` : ''}

                      </div>
                    `;

                  <b>※TUG：</b>椅子から立ち上がり、3m先の目印を回って再び座るまでの時間を測定します。歩行能力や転倒リスクの目安となります。
                </div>

            </div>
          </div>
        </div>
      `;
    }

    function modals() {

            <div class="modal-body">
              <h1>問題が発生しました</h1>
              <pre style="white-space:pre-wrap;color:#b91c1c;background:#f8fafc;padding:12px;border-radius:8px">${html(e.stack || e)}</pre>
              <button class="primary" onclick="location.reload()">再読み込み</button>
              <button class="small-btn red" onclick="localStorage.removeItem('${STORAGE_KEY}');location.reload()" style="width:100%;margin-top:8px">保存データを初期化して復旧</button>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
